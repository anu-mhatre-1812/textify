<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textify</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111b21;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        font-family: system-ui, -apple-system, sans-serif;
        color: #e9edef;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 168, 132, 0.1);
        border-top: 3px solid #00a884;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <span>Textify</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
